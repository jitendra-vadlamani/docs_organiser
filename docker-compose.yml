services:
  docs_organiser:
    build: .
    ports:
      - "8090:8090"
      - "8081:8081"
    environment:
      - DOCS_API=http://host.docker.internal:8080/v1
      - DOCS_SERVER_PORT=8090
      - DOCS_METRICS_PORT=8081
    volumes:
      - ./source:/data/source
      - ./destination:/data/destination
      - ./config.yaml:/root/config.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
